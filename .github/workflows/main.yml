name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests
        run: yarn test --browsers=ChromeHeadlessNoSandbox --watch=false

      - name: Check source punctuation is ASCII
        run: |
          if git grep -nP '[\x{2013}\x{2014}\x{2190}-\x{21FF}\x{2500}-\x{257F}]' -- 'src/app' 'src/index.html' 'src/environments' 'README.md' ':!*.spec.ts'; then
            echo "Non-ASCII punctuation found in source; use plain ASCII equivalents."
            exit 1
          fi
