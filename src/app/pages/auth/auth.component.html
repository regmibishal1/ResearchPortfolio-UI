<div class="auth-page page-container">
  <div class="animated-bg">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
  </div>

  <mat-progress-bar *ngIf="isLoading" mode="indeterminate" class="auth-progress"></mat-progress-bar>

  <div class="auth-container">
    <div class="auth-card glass animate-in">
      <!-- Login Form -->
      <div class="form-section" *ngIf="isLoginDivVisible">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to access advanced features</p>

        <form class="auth-form" (ngSubmit)="onLogin()" #loginForm="ngForm">
          <div class="input-group">
            <mat-icon class="input-icon">person</mat-icon>
            <input
              type="text"
              name="username"
              [(ngModel)]="loginObj.username"
              placeholder="Username"
              required
            />
          </div>
          <div class="input-group">
            <mat-icon class="input-icon">lock</mat-icon>
            <input
              type="password"
              name="password"
              [(ngModel)]="loginObj.password"
              placeholder="Password"
              required
            />
          </div>
          <button
            type="submit"
            class="btn-primary auth-submit"
            [disabled]="isLoading || !loginForm.form.valid"
          >
            Sign In
          </button>
        </form>

        <p class="auth-toggle-text">
          Don't have an account?
          <a href="javascript:void(0)" (click)="isLoginDivVisible = false">Create one here</a>.
        </p>
      </div>

      <!-- Register Form -->
      <div class="form-section" *ngIf="!isLoginDivVisible">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join us to explore the research portfolio</p>

        <form class="auth-form" (ngSubmit)="onRegister()" #registerForm="ngForm">
          <div class="input-row">
            <div class="input-group">
              <mat-icon class="input-icon">badge</mat-icon>
              <input
                type="text"
                name="firstname"
                [(ngModel)]="registerObj.firstname"
                placeholder="First Name"
                required
              />
            </div>
            <div class="input-group">
              <mat-icon class="input-icon">badge</mat-icon>
              <input
                type="text"
                name="lastname"
                [(ngModel)]="registerObj.lastname"
                placeholder="Last Name"
                required
              />
            </div>
          </div>

          <div class="input-group">
            <mat-icon class="input-icon">email</mat-icon>
            <input
              type="email"
              name="email"
              [(ngModel)]="registerObj.email"
              placeholder="Email"
              required
            />
          </div>
          <div class="input-group">
            <mat-icon class="input-icon">person</mat-icon>
            <input
              type="text"
              name="username"
              [(ngModel)]="registerObj.username"
              placeholder="Username"
              required
            />
          </div>
          <div class="input-group">
            <mat-icon class="input-icon">lock</mat-icon>
            <input
              type="password"
              name="password"
              [(ngModel)]="registerObj.password"
              placeholder="Password"
              required
            />
          </div>

          <button
            type="submit"
            class="btn-primary auth-submit"
            [disabled]="isLoading || !registerForm.form.valid"
          >
            Sign Up
          </button>
        </form>

        <p class="auth-toggle-text">
          Already have an account?
          <a href="javascript:void(0)" (click)="isLoginDivVisible = true">Sign in here</a>.
        </p>
      </div>
    </div>
  </div>
</div>
