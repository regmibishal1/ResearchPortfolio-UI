<svg viewBox="0 0 960 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b8ba5"/>
    </marker>
  </defs>

  <!-- Visitor -->
  <rect x="30" y="180" width="130" height="70" rx="10" fill="#1a1a2e" stroke="#3a3a55" stroke-width="1.5"/>
  <text x="95" y="210" fill="#f0f0f5" font-size="15" font-weight="600" text-anchor="middle">Browser</text>
  <text x="95" y="230" fill="#8b8ba5" font-size="11" text-anchor="middle">bishalregmi.com</text>

  <!-- Cloudflare zone -->
  <rect x="215" y="60" width="220" height="330" rx="12" fill="none" stroke="#f0c040" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.55"/>
  <text x="325" y="86" fill="#f0c040" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1">CLOUDFLARE EDGE</text>

  <rect x="240" y="105" width="170" height="66" rx="10" fill="#1a1a2e" stroke="#3a3a55" stroke-width="1.5"/>
  <text x="325" y="132" fill="#f0f0f5" font-size="14" font-weight="600" text-anchor="middle">Pages</text>
  <text x="325" y="152" fill="#8b8ba5" font-size="11" text-anchor="middle">Angular UI (static)</text>

  <rect x="240" y="205" width="170" height="66" rx="10" fill="#1a1a2e" stroke="#3a3a55" stroke-width="1.5"/>
  <text x="325" y="232" fill="#f0f0f5" font-size="14" font-weight="600" text-anchor="middle">Tunnel</text>
  <text x="325" y="252" fill="#8b8ba5" font-size="11" text-anchor="middle">no open ports</text>

  <rect x="240" y="300" width="170" height="66" rx="10" fill="#1a1a2e" stroke="#3a3a55" stroke-width="1.5"/>
  <text x="325" y="327" fill="#f0f0f5" font-size="14" font-weight="600" text-anchor="middle">WAF + rate limits</text>
  <text x="325" y="347" fill="#8b8ba5" font-size="11" text-anchor="middle">bot mitigation</text>

  <!-- Self-hosted zone -->
  <rect x="495" y="60" width="435" height="330" rx="12" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.5"/>
  <text x="712" y="86" fill="#4ade80" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1">SELF-HOSTED NAS (DOCKER)</text>

  <rect x="520" y="105" width="180" height="70" rx="10" fill="#1a1a2e" stroke="#3a3a55" stroke-width="1.5"/>
  <text x="610" y="132" fill="#f0f0f5" font-size="14" font-weight="600" text-anchor="middle">Spring Boot</text>
  <text x="610" y="152" fill="#8b8ba5" font-size="11" text-anchor="middle">auth, JWT issuance</text>

  <rect x="520" y="205" width="180" height="70" rx="10" fill="#1a1a2e" stroke="#3a3a55" stroke-width="1.5"/>
  <text x="610" y="232" fill="#f0f0f5" font-size="14" font-weight="600" text-anchor="middle">FastAPI</text>
  <text x="610" y="252" fill="#8b8ba5" font-size="11" text-anchor="middle">ML models, live stats</text>

  <rect x="745" y="150" width="160" height="80" rx="10" fill="#1a1a2e" stroke="#f0c040" stroke-width="1.5"/>
  <text x="825" y="180" fill="#f0f0f5" font-size="14" font-weight="600" text-anchor="middle">PostgreSQL</text>
  <text x="825" y="200" fill="#8b8ba5" font-size="11" text-anchor="middle">internal network only</text>
  <text x="825" y="216" fill="#8b8ba5" font-size="11" text-anchor="middle">per-app roles</text>

  <rect x="520" y="300" width="180" height="66" rx="10" fill="#1a1a2e" stroke="#3a3a55" stroke-width="1.5"/>
  <text x="610" y="327" fill="#f0f0f5" font-size="14" font-weight="600" text-anchor="middle">Prediction pipeline</text>
  <text x="610" y="347" fill="#8b8ba5" font-size="11" text-anchor="middle">daily Monte Carlo run</text>

  <!-- Flows -->
  <line x1="160" y1="200" x2="238" y2="142" stroke="#8b8ba5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="225" x2="238" y2="235" stroke="#8b8ba5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="410" y1="228" x2="518" y2="145" stroke="#8b8ba5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="242" x2="518" y2="238" stroke="#8b8ba5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="700" y1="140" x2="743" y2="170" stroke="#8b8ba5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="240" x2="743" y2="210" stroke="#8b8ba5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="298" x2="610" y2="277" stroke="#8b8ba5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Flow labels -->
  <text x="196" y="160" fill="#8b8ba5" font-size="10" text-anchor="middle">HTTPS</text>
  <text x="464" y="180" fill="#8b8ba5" font-size="10" text-anchor="middle">auth.*</text>
  <text x="464" y="255" fill="#8b8ba5" font-size="10" text-anchor="middle">api.*</text>
  <text x="648" y="292" fill="#8b8ba5" font-size="10" text-anchor="middle">ingest</text>

  <!-- Footnote -->
  <text x="480" y="432" fill="#8b8ba5" font-size="11" text-anchor="middle">JWT for user auth, API key gate on public demos, admin bearer for pipeline writes. Reader and writer DB roles are isolated per schema.</text>
</svg>
