<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bishal Regmi | Portfolio</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Bishal Regmi is a Software Engineer & Data Scientist. Explore my projects, skills, and experience in full-stack development, data science, and machine learning."
    />
    <meta
      name="keywords"
      content="Bishal Regmi, Software Engineer, Data Scientist, Portfolio, Angular, Python, Machine Learning, Full Stack Developer"
    />
    <meta name="author" content="Bishal Regmi" />

    <!-- Open Graph -->
    <meta property="og:title" content="Bishal Regmi | Portfolio" />
    <meta
      property="og:description"
      content="Software Engineer & Data Scientist. Explore my projects and experience."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bishalregmi.com/" />
    <meta property="og:image" content="https://bishalregmi.com/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bishal Regmi | Portfolio" />
    <meta
      name="twitter:description"
      content="Software Engineer & Data Scientist. Explore my projects and experience."
    />
    <meta name="twitter:image" content="https://bishalregmi.com/assets/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://bishalregmi.com/" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "@id": "https://bishalregmi.com/#person",
            "name": "Bishal Regmi",
            "jobTitle": "Software Engineer & Data Scientist",
            "url": "https://bishalregmi.com/",
            "sameAs": ["https://github.com/regmibishal1", "https://linkedin.com/in/bishalregmi"]
          },
          {
            "@type": "WebSite",
            "@id": "https://bishalregmi.com/#website",
            "url": "https://bishalregmi.com/",
            "name": "Bishal Regmi | Portfolio",
            "description": "Software Engineer & Data Scientist. Explore my projects, skills, and experience in full-stack development, data science, and machine learning.",
            "author": { "@id": "https://bishalregmi.com/#person" }
          }
        ]
      }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/logo.png" />

    <!-- Warm the connection to the data API so the first request on a data
         page skips DNS, TLS, and tunnel setup. -->
    <link rel="preconnect" href="https://api.bishalregmi.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.bishalregmi.com" />

    <!-- Google Fonts: Inter + Outfit + Material Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  </head>
  <body class="mat-typography">
    <app-root></app-root>
  </body>
</html>
